name: Vistara Daily Order Processor

on:
  schedule:
    # 3:00 AM IST = 21:30 UTC (previous day)
    - cron: '30 21 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'manual trigger'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  process-orders:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Wake up Render
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          echo "Waking up Render server..."
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Server awake!"
              break
            fi
            sleep 15
          done

      - name: Run daily processor
        env:
          APP_URL: ${{ secrets.APP_URL }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: python automation/github_trigger.py

      - name: Done
        if: always()
        run: echo "Finished at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"