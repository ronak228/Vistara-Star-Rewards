name: Vistara Daily Order Processor

on:
  schedule:
    # 3:00 AM IST = 21:30 UTC (previous day)
    - cron: '30 21 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'manual trigger'

jobs:
  process-orders:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run daily processor
        env:
          APP_URL: ${{ secrets.APP_URL }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: python automation/github_trigger.py

      - name: Summary
        if: always()
        run: echo "Completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
