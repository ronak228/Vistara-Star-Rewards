name: Vistara Star Rewards

on:
  push:
    branches:
      - main
  schedule:
    # 3:00 AM IST = 21:30 UTC (previous day)
    - cron: '30 21 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'manual trigger'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job 1 — Auto deploy to Vercel on every push
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # Job 2 — Daily order processor at 3AM IST
  process-orders:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run daily processor
        env:
          APP_URL: ${{ secrets.APP_URL }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: python automation/github_trigger.py

      - name: Done
        if: always()
        run: echo "Finished at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"